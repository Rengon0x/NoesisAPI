  /api/v1/wallet/{addr}/connections:
    get:
      operationId: walletConnections
      tags: [Wallet Analysis]
      summary: Wallet SOL transfer connections
      description: |
        Scans up to 10,000 transactions to find SOL transfer connections,
        filtering off-curve (PDA) addresses. Shows net flow direction
        and transfer frequency.
      x-rate-limit: Heavy
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - name: min_sol
          in: query
          schema:
            type: number
            format: float
            default: 0.1
          description: Minimum SOL threshold for connections
        - name: max_pages
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 20
          description: Maximum pages of transaction history to scan
      responses:
        "200":
          description: Wallet connections
          content:
            application/json:
              schema:
                type: object
                required: [address, total_transactions_scanned, connections]
                properties:
                  address:
                    type: string
                  total_transactions_scanned:
                    type: integer
                  connections:
                    type: array
                    items:
                      type: object
                      required: [address, total_sent_sol, total_received_sol, net_sol, transfer_count, first_seen, last_seen]
                      properties:
                        address:
                          type: string
                        total_sent_sol:
                          type: number
                        total_received_sol:
                          type: number
                        net_sol:
                          type: number
                        transfer_count:
                          type: integer
                        first_seen:
                          type: integer
                          description: Unix timestamp
                        last_seen:
                          type: integer
                          description: Unix timestamp
                        label:
                          type: string
                          nullable: true
                        tags:
                          type: array
                          items:
                            type: string
        "429":
          $ref: "#/components/responses/RateLimited"

