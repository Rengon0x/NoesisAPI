  # ──────────────────────────────────────────────
  /api/v1/solana/rpc:
    post:
      operationId: solanaRpc
      tags: [Solana RPC Proxy]
      summary: JSON-RPC passthrough
      description: |
        Forwards a standard Solana JSON-RPC request to the configured RPC endpoint.
        Supports all standard Solana RPC methods.
      x-rate-limit: Light
      security:
        - ApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jsonrpc, id, method]
              properties:
                jsonrpc:
                  type: string
                  enum: ["2.0"]
                id:
                  oneOf:
                    - type: string
                    - type: integer
                method:
                  type: string
                  description: Solana RPC method name
                params:
                  type: array
                  items: {}
            example:
              jsonrpc: "2.0"
              id: 1
              method: getSlot
              params: []
      responses:
        "200":
          description: JSON-RPC response
          content:
            application/json:
              schema:
                type: object
                properties:
                  jsonrpc:
                    type: string
                  id:
                    oneOf:
                      - type: string
                      - type: integer
                  result: {}
                  error:
                    type: object
                    properties:
                      code:
                        type: integer
                      message:
                        type: string
        "429":
          $ref: "#/components/responses/RateLimited"

