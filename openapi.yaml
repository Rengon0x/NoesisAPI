openapi: 3.1.0
info:
  title: Noesis API
  version: 1.0.0
  description: |
    Noesis provides deep on-chain analytics for Solana and Base tokens and wallets.
    It combines data from multiple sources (GMGN, DexScreener, Helius, Solscan) into
    enriched, actionable intelligence for traders and researchers.

    ## Authentication

    Noesis uses two authentication mechanisms:

    1. **JWT Session** — Obtained via SIWS (Sign In With Solana) challenge/verify flow.
       Used for key management endpoints. Pass as `Authorization: Bearer <jwt>`.
    2. **API Key** — Created via the key management endpoints. Used for all data endpoints.
       Pass as `X-API-Key: se_...` header or `Authorization: Bearer se_...`.

    ## Rate Limiting

    Endpoints are classified as **Light** (1 request/second) or **Heavy** (1 request/minute).
    Exceeding limits returns HTTP 429 with details about the limit and type.

    ## Chain Support

    Most endpoints accept an optional `chain` query parameter (`sol` or `base`, default `sol`).
  contact:
    name: Noesis
    url: https://noesisapi.dev
  license:
    name: Proprietary

servers:
  - url: https://noesisapi.dev
    description: Production

tags:
  - name: Auth
    description: SIWS authentication flow (no rate limit)
  - name: Key Management
    description: API key CRUD and usage stats (requires JWT session)
  - name: Health & Stats
    description: Public health checks and platform statistics
  - name: Token Analysis
    description: Deep token analytics, holder analysis, and security checks
  - name: Wallet Analysis
    description: Wallet profiling, history, and connections
  - name: Cross-Token Analysis
    description: Cross-token holder and trader overlap detection
  - name: On-Chain Data
    description: Direct on-chain account and transaction data
  - name: Analytics Proxy
    description: GMGN analytics data proxy
  - name: Solana RPC Proxy
    description: Solana RPC and DAS API proxy
  - name: AI Chat
    description: AI-powered on-chain research assistant

paths:
  # ──────────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────────
  /api/v1/auth/challenge:
    post:
      operationId: createChallenge
      tags: [Auth]
      summary: Request a SIWS sign-in challenge
      description: |
        Generates a nonce and a human-readable message that the wallet must sign
        to prove ownership. The nonce is single-use and expires after 5 minutes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wallet]
              properties:
                wallet:
                  type: string
                  description: Base58-encoded Solana public key
                  example: 7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU
            example:
              wallet: 7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU
      responses:
        "200":
          description: Challenge created
          content:
            application/json:
              schema:
                type: object
                required: [nonce, message]
                properties:
                  nonce:
                    type: string
                    format: uuid
                    description: Single-use nonce
                    example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                  message:
                    type: string
                    description: Human-readable message for the wallet to sign
                    example: "Sign in to Noesis with wallet 7xKXtg..."
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/auth/verify:
    post:
      operationId: verifySignature
      tags: [Auth]
      summary: Verify wallet signature and obtain JWT
      description: |
        Submits the Ed25519 signature of the challenge message. On success,
        returns a JWT session token valid for 24 hours.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wallet, signature]
              properties:
                wallet:
                  type: string
                  description: Base58-encoded Solana public key
                  example: 7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU
                signature:
                  type: string
                  description: Base58-encoded Ed25519 signature of the challenge message
                  example: 3ASDf...base58sig
            example:
              wallet: 7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU
              signature: 3ASDf...base58sig
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                required: [token, wallet, expires_at]
                properties:
                  token:
                    type: string
                    description: JWT session token
                    example: eyJhbGciOiJIUzI1NiIs...
                  wallet:
                    type: string
                    description: Authenticated wallet public key
                    example: 7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU
                  expires_at:
                    type: string
                    format: date-time
                    description: Token expiration timestamp
                    example: "2026-03-29T12:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      operationId: getMe
      tags: [Auth]
      summary: Get current session info
      description: Returns the authenticated wallet address and session metadata.
      security:
        - BearerJwt: []
      responses:
        "200":
          description: Session info
          content:
            application/json:
              schema:
                type: object
                required: [wallet, is_admin, expires_at]
                properties:
                  wallet:
                    type: string
                    example: 7xKXtg2CW87d97TXJSDpbD5jBkheTqA83TZRuJosgAsU
                  is_admin:
                    type: boolean
                    example: false
                  expires_at:
                    type: string
                    format: date-time
                    example: "2026-03-29T12:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  # Key Management
  # ──────────────────────────────────────────────
  /api/v1/keys:
    post:
      operationId: createApiKey
      tags: [Key Management]
      summary: Create a new API key
      security:
        - BearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: Human-readable label for the key
                  example: My trading bot
            example:
              name: My trading bot
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyFull"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      operationId: listApiKeys
      tags: [Key Management]
      summary: List all API keys for the authenticated wallet
      security:
        - BearerJwt: []
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKeyFull"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/keys/{id}:
    delete:
      operationId: deleteApiKey
      tags: [Key Management]
      summary: Delete an API key
      security:
        - BearerJwt: []
      parameters:
        - $ref: "#/components/parameters/KeyId"
      responses:
        "200":
          description: Key deleted
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
                    example: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/keys/{id}/usage:
    get:
      operationId: getApiKeyUsage
      tags: [Key Management]
      summary: Get usage statistics for an API key
      security:
        - BearerJwt: []
      parameters:
        - $ref: "#/components/parameters/KeyId"
        - name: period
          in: query
          schema:
            type: string
            enum: [4h, 24h, 7d, 30d]
            default: 24h
          description: Time period for usage stats
      responses:
        "200":
          description: Usage statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyUsage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────
  # Health & Stats
  # ──────────────────────────────────────────────
  /api/v1/health:
    get:
      operationId: healthCheck
      tags: [Health & Stats]
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/stats:
    get:
      operationId: getStats
      tags: [Health & Stats]
      summary: Platform-wide statistics
      responses:
        "200":
          description: Aggregate stats
          content:
            application/json:
              schema:
                type: object
                required: [total_requests, api_keys_created, tokens_analyzed, wallets_analyzed]
                properties:
                  total_requests:
                    type: integer
                    format: int64
                    example: 1523847
                  api_keys_created:
                    type: integer
                    format: int64
                    example: 342
                  tokens_analyzed:
                    type: integer
                    format: int64
                    example: 89412
                  wallets_analyzed:
                    type: integer
                    format: int64
                    example: 254103

  /api/v1/skill.md:
    get:
      operationId: getSkillMd
      tags: [Health & Stats]
      summary: AI skill definition (Markdown)
      description: Returns a Markdown document describing Noesis capabilities for AI agents.
      responses:
        "200":
          description: Markdown content
          content:
            text/markdown:
              schema:
                type: string

  /llms.txt:
    get:
      operationId: getLlmsTxt
      tags: [Health & Stats]
      summary: LLMs.txt file
      description: Returns a plain-text file for LLM discovery.
      responses:
        "200":
          description: Plain text content
          content:
            text/plain:
              schema:
                type: string

  # ──────────────────────────────────────────────
  # Token Analysis — Light
  # ──────────────────────────────────────────────
  /api/v1/token/{addr}/preview:
    get:
      operationId: tokenPreview
      tags: [Token Analysis]
      summary: Quick token preview
      description: Returns basic token info from aggregated sources. Lightweight and fast.
      x-rate-limit: Light
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Chain"
      responses:
        "200":
          description: Token preview
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    $ref: "#/components/schemas/UnifiedTokenInfo"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/token/{addr}/info:
    get:
      operationId: tokenInfo
      tags: [Token Analysis]
      summary: Detailed on-chain token metadata
      description: |
        Returns on-chain metadata including authorities, supply details, and parsed asset data.
      x-rate-limit: Light
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Chain"
      responses:
        "200":
          description: Token info
          content:
            application/json:
              schema:
                type: object
                required: [address, chain, metadata, authorities, supply]
                properties:
                  address:
                    type: string
                    example: So11111111111111111111111111111111111111112
                  chain:
                    type: string
                    enum: [sol, base]
                    example: sol
                  metadata:
                    type: object
                    properties:
                      name:
                        type: string
                        example: Wrapped SOL
                      symbol:
                        type: string
                        example: SOL
                      description:
                        type: string
                      image:
                        type: string
                        format: uri
                      decimals:
                        type: integer
                        example: 9
                  authorities:
                    type: object
                    properties:
                      mint_authority:
                        type: string
                        nullable: true
                      freeze_authority:
                        type: string
                        nullable: true
                      update_authority:
                        type: string
                        nullable: true
                  supply:
                    type: object
                    properties:
                      amount:
                        type: string
                        description: Raw supply as string to avoid precision loss
                      decimals:
                        type: integer
                      ui_amount:
                        type: number
                  price:
                    type: number
                    nullable: true
                    description: Current price in USD
                  raw_asset:
                    type: object
                    nullable: true
                    description: Raw DAS asset response
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/token/{addr}/holders:
    get:
      operationId: tokenHolders
      tags: [Token Analysis]
      summary: Paginated token holders list
      x-rate-limit: Light
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Chain"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
          description: Number of holders to return
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor from previous response
      responses:
        "200":
          description: Holders list
          content:
            application/json:
              schema:
                type: object
                required: [mint, total_returned, holders]
                properties:
                  mint:
                    type: string
                  total_returned:
                    type: integer
                  holders:
                    type: array
                    items:
                      type: object
                      properties:
                        token_account:
                          type: string
                        owner:
                          type: string
                        amount:
                          type: integer
                          format: uint64
                        is_escrow:
                          type: boolean
                  next_cursor:
                    type: string
                    nullable: true
        "429":
          $ref: "#/components/responses/RateLimited"

  # ──────────────────────────────────────────────
  # Token Analysis — Heavy
  # ──────────────────────────────────────────────
  /api/v1/token/{addr}/scan:
    get:
      operationId: tokenScan
      tags: [Token Analysis]
      summary: Comprehensive token scan
      description: |
        Full token analysis combining token info, DexScreener pair data, top traders,
        security checks, token statistics, and holder breakdown. This is the most
        complete single-call token analysis endpoint.
      x-rate-limit: Heavy
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Chain"
      responses:
        "200":
          description: Full scan result
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    $ref: "#/components/schemas/UnifiedTokenInfo"
                  dexscreener:
                    $ref: "#/components/schemas/DexPair"
                  top_traders:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScanTrader"
                  security:
                    $ref: "#/components/schemas/SecurityInfo"
                  token_stat:
                    $ref: "#/components/schemas/TokenStat"
                  holder_stat:
                    $ref: "#/components/schemas/HolderStat"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/token/{addr}/top-holders:
    get:
      operationId: tokenTopHolders
      tags: [Token Analysis]
      summary: Top holders with wallet enrichment
      description: |
        Returns the largest holders enriched with wallet data, profit stats,
        funding sources, and Solscan labels/tags.
      x-rate-limit: Heavy
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Chain"
      responses:
        "200":
          description: Enriched top holders
          content:
            application/json:
              schema:
                type: object
                required: [token, holders]
                properties:
                  token:
                    $ref: "#/components/schemas/UnifiedTokenInfo"
                  holders:
                    type: array
                    items:
                      $ref: "#/components/schemas/HolderEntry"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/token/{addr}/bundles:
    get:
      operationId: tokenBundles
      tags: [Token Analysis]
      summary: Bundle analysis
      description: |
        Detects bundled transactions at launch, showing token statistics
        and holder category breakdowns (snipers, bots, insiders, etc.).
      x-rate-limit: Heavy
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Chain"
      responses:
        "200":
          description: Bundle analysis
          content:
            application/json:
              schema:
                type: object
                required: [token, token_stat]
                properties:
                  token:
                    $ref: "#/components/schemas/UnifiedTokenInfo"
                  token_stat:
                    $ref: "#/components/schemas/TokenStat"
                  holder_stat:
                    $ref: "#/components/schemas/HolderStat"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/token/{addr}/fresh-wallets:
    get:
      operationId: tokenFreshWallets
      tags: [Token Analysis]
      summary: Fresh wallet detection
      description: |
        Identifies recently-created wallets holding the token, categorized by age.
        Useful for detecting coordinated buying or sybil attacks.
      x-rate-limit: Heavy
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Chain"
      responses:
        "200":
          description: Fresh wallet analysis
          content:
            application/json:
              schema:
                type: object
                required: [token, total_supply, fresh_count, total_analyzed, supply_controlled, wallets]
                properties:
                  token:
                    $ref: "#/components/schemas/UnifiedTokenInfo"
                  total_supply:
                    type: number
                  fresh_count:
                    type: integer
                  total_analyzed:
                    type: integer
                  supply_controlled:
                    type: number
                    description: Percentage of supply held by fresh wallets
                  wallets:
                    type: array
                    items:
                      $ref: "#/components/schemas/AnalyzedWalletEntry"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/token/{addr}/team-supply:
    get:
      operationId: tokenTeamSupply
      tags: [Token Analysis]
      summary: Team/insider supply detection
      description: |
        Identifies wallets likely controlled by the token team based on funding
        patterns and transaction behavior. Same response shape as fresh-wallets
        but uses `team_count` instead of `fresh_count`.
      x-rate-limit: Heavy
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Chain"
      responses:
        "200":
          description: Team supply analysis
          content:
            application/json:
              schema:
                type: object
                required: [token, total_supply, team_count, total_analyzed, supply_controlled, wallets]
                properties:
                  token:
                    $ref: "#/components/schemas/UnifiedTokenInfo"
                  total_supply:
                    type: number
                  team_count:
                    type: integer
                  total_analyzed:
                    type: integer
                  supply_controlled:
                    type: number
                  wallets:
                    type: array
                    items:
                      $ref: "#/components/schemas/AnalyzedWalletEntry"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/token/{addr}/dev-profile:
    get:
      operationId: tokenDevProfile
      tags: [Token Analysis]
      summary: Token creator profile
      description: |
        Profiles the token creator including their wallet data, previously
        created coins, and funding source.
      x-rate-limit: Heavy
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Chain"
      responses:
        "200":
          description: Developer profile
          content:
            application/json:
              schema:
                type: object
                required: [token, creator]
                properties:
                  token:
                    $ref: "#/components/schemas/UnifiedTokenInfo"
                  creator:
                    type: string
                    description: Creator wallet address
                  wallet_data:
                    $ref: "#/components/schemas/WalletData"
                  wallet_info:
                    $ref: "#/components/schemas/WalletInfo"
                  created_coins:
                    type: array
                    items:
                      type: object
                      properties:
                        mint:
                          type: string
                        name:
                          type: string
                        symbol:
                          type: string
                        market_cap:
                          type: number
                        usd_market_cap:
                          type: number
                        complete:
                          type: boolean
                          description: Whether the token graduated from bonding curve
                        created_timestamp:
                          type: integer
                          description: Unix timestamp
                  funding:
                    type: object
                    nullable: true
                    properties:
                      funder:
                        type: string
                      funder_name:
                        type: string
                      amount:
                        type: number
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/token/{addr}/best-traders:
    get:
      operationId: tokenBestTraders
      tags: [Token Analysis]
      summary: Best traders for a token
      description: |
        Returns the most profitable traders for a token, enriched with
        wallet labels, social profiles, and suspicion flags.
      x-rate-limit: Heavy
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Chain"
      responses:
        "200":
          description: Best traders
          content:
            application/json:
              schema:
                type: object
                required: [token, traders]
                properties:
                  token:
                    $ref: "#/components/schemas/UnifiedTokenInfo"
                  traders:
                    type: array
                    items:
                      $ref: "#/components/schemas/BestTraderEntry"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/token/{addr}/early-buyers:
    get:
      operationId: tokenEarlyBuyers
      tags: [Token Analysis]
      summary: Early buyers within a time window
      description: |
        Scans on-chain transactions to find wallets that bought the token
        within the specified number of hours after creation. Uses Helius
        transaction history for accurate results.
      x-rate-limit: Heavy
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Chain"
        - name: hours
          in: query
          schema:
            type: number
            format: float
            minimum: 0.1
            maximum: 24.0
            default: 1
          description: Time window in hours after token creation
      responses:
        "200":
          description: Early buyers
          content:
            application/json:
              schema:
                type: object
                required: [token, hours, total_transactions_scanned, buyers]
                properties:
                  token:
                    $ref: "#/components/schemas/UnifiedTokenInfo"
                  hours:
                    type: number
                  total_transactions_scanned:
                    type: integer
                  buyers:
                    type: array
                    items:
                      type: object
                      required: [address, signature, sol_spent, token_amount, timestamp]
                      properties:
                        address:
                          type: string
                        signature:
                          type: string
                        sol_spent:
                          type: number
                        token_amount:
                          type: number
                        timestamp:
                          type: integer
                          description: Unix timestamp
                        label:
                          type: string
                          nullable: true
                        tags:
                          type: array
                          items:
                            type: string
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/v1/token/{addr}/entry-price:
    get:
      operationId: tokenEntryPrice
      tags: [Token Analysis]
      summary: Holder entry prices and PnL
      description: |
        Returns current holders with their average entry cost, realized and
        unrealized profit, and detailed trade counts.
      x-rate-limit: Heavy
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - $ref: "#/components/parameters/Chain"
      responses:
        "200":
          description: Entry price data
          content:
            application/json:
              schema:
                type: object
                required: [token, holders]
                properties:
                  token:
                    $ref: "#/components/schemas/UnifiedTokenInfo"
                  holders:
                    type: array
                    items:
                      $ref: "#/components/schemas/EntryPriceHolder"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ──────────────────────────────────────────────
  # Wallet Analysis
  # ──────────────────────────────────────────────
  /api/v1/wallet/{addr}:
    get:
      operationId: walletProfile
      tags: [Wallet Analysis]
      summary: Full wallet profile
      description: |
        Comprehensive wallet analysis including trading stats, PnL over multiple
        time windows, SOL balance, funding source, current holdings, and identity.
      x-rate-limit: Heavy
      security:
        - ApiKey: []
      parameters:
        - $ref: "#/components/parameters/WalletAddress"
        - $ref: "#/components/parameters/Chain"
      responses:
        "200":
          description: Wallet profile
          content:
            application/json:
              schema:
                type: object
                required: [address, chain]
                properties:
                  address:
                    type: string
