            type: string
            enum: [SWAP, TRANSFER, NFT_SALE, NFT_LISTING, COMPRESSED_NFT_MINT, TOKEN_MINT, UNKNOWN]
          description: Filter by transaction type
        - name: source
          in: query
          schema:
